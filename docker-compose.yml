version: '3.8'

services:
  igrid-viewer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: igrid-viewer
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - Jwt__Key=${JWT_SECRET:-change-this-to-a-secure-key-in-production}
    volumes:
      - igrid-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/swagger/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  igrid-data:
